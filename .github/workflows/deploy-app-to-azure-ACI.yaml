name: Build and Deploy to Azure Container Instances Service

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Build and publish the images to Docker Hub"
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: learn-docker-with-prakashtm456
          image: prakashtm456/learn-docker:react-app-latest
          name: react-app-container
          location: centralindia
          ports: 80
          # to avoid the port number the aci url, updated the docker file and workflow - http://learn-docker-with-prakashtm456.centralindia.azurecontainer.io:3000
          protocol: TCP

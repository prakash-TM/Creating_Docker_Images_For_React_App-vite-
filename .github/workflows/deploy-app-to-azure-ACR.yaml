name: Build and Deploy to Azure Container Registry Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/react-app:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/react-app:${{ github.sha }}

      - name: Deploy to Azure App Service
        run: |
          curl -X POST "${{ secrets.AZURE_WEBHOOK_URL }}"
          # App Service sees the webhook → pulls :latest from ACR → restarts
